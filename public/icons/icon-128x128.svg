    dominant-baseline="middle"
  >W</text>
  <!-- Wonderful text -->
  <text 
    x="64" 
    y="107.52" 
    font-family="Arial, sans-serif" 
    font-weight="700" 
    font-size="10.88" 
    fill="#10B981"
