<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Upload Image - Wonderful Toba</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f9f9f9;
        }
        .upload-area:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        .upload-area.dragover {
            border-color: #667eea;
            background: #e8ebff;
            transform: scale(1.02);
        }
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 10px;
        }
        .upload-hint {
            color: #999;
            font-size: 12px;
        }
        input[type="file"] {
            display: none;
        }
        .preview {
            margin-top: 30px;
            display: none;
        }
        .preview.show {
            display: block;
        }
        .preview img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 15px;
        }
        .info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            color: #666;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        .info-row:last-child {
            margin-bottom: 0;
        }
        .info-label {
            font-weight: 600;
            color: #333;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .loading.show {
            display: block;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        .error.show {
            display: block;
        }
        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        .success.show {
            display: block;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Test Upload Image</h1>
        <p class="subtitle">Upload gambar untuk test konversi ke WebP</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Klik atau drag & drop gambar di sini</div>
            <div class="upload-hint">JPG, PNG, WebP, GIF (max 10MB)</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div>Mengupload dan mengkonversi ke WebP...</div>
        </div>

        <div class="preview" id="preview">
            <img id="previewImg" src="" alt="Preview">
            <div class="info">
                <div class="info-row">
                    <span class="info-label">URL:</span>
                    <span id="infoUrl">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Filename:</span>
                    <span id="infoFilename">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Size:</span>
                    <span id="infoSize">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Dimensions:</span>
                    <span id="infoDimensions">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Format:</span>
                    <span id="infoFormat">-</span>
                </div>
            </div>
            <button class="btn" onclick="location.reload()">Upload Lagi</button>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const preview = document.getElementById('preview');
        const previewImg = document.getElementById('previewImg');
        const error = document.getElementById('error');
        const success = document.getElementById('success');

        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());

        // File selected
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleUpload(e.target.files[0]);
            }
        });

        // Drag & drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleUpload(e.dataTransfer.files[0]);
            }
        });

        async function handleUpload(file) {
            // Validate
            if (!file.type.startsWith('image/')) {
                showError('File harus berupa gambar!');
                return;
            }

            if (file.size > 10 * 1024 * 1024) {
                showError('Ukuran file maksimal 10MB!');
                return;
            }

            // Show loading
            uploadArea.style.display = 'none';
            loading.classList.add('show');
            error.classList.remove('show');
            success.classList.remove('show');

            try {
                const formData = new FormData();
                formData.append('file', file);

                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Upload gagal');
                }

                const data = await response.json();

                // Show preview
                loading.classList.remove('show');
                preview.classList.add('show');
                previewImg.src = data.url;
                
                document.getElementById('infoUrl').textContent = data.url;
                document.getElementById('infoFilename').textContent = data.filename;
                document.getElementById('infoSize').textContent = formatBytes(data.size);
                document.getElementById('infoDimensions').textContent = `${data.width} x ${data.height}px`;
                document.getElementById('infoFormat').textContent = data.format.toUpperCase();

                showSuccess(`Upload berhasil! File size: ${formatBytes(file.size)} → ${formatBytes(data.size)} (${Math.round((1 - data.size/file.size) * 100)}% lebih kecil)`);

            } catch (err) {
                loading.classList.remove('show');
                uploadArea.style.display = 'block';
                showError(err.message);
            }
        }

        function showError(message) {
            error.textContent = '❌ ' + message;
            error.classList.add('show');
        }

        function showSuccess(message) {
            success.textContent = '✅ ' + message;
            success.classList.add('show');
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }
    </script>
</body>
</html>
