<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outbound CMS | Wonderful Toba Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { 'toba-green': '#15803d', 'toba-accent': '#22c55e' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 flex min-h-screen">
    <main class="flex-1 p-6 lg:p-10">
        <div class="max-w-6xl mx-auto pb-20">
            <!-- Header -->
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-10">
                <div>
                    <a href="dashboard.html" class="flex items-center gap-2 text-slate-400 hover:text-slate-900 transition-colors font-bold mb-4 group">
                        <i data-lucide="arrow-left" class="w-[18px] h-[18px] group-hover:-translate-x-1 transition-transform"></i> Kembali
                    </a>
                    <h2 class="text-4xl font-black text-slate-900 tracking-tight">Outbound <span class="text-toba-green">CMS</span></h2>
                    <p class="text-slate-500 font-medium">Kelola konten landing page Corporate Outbound secara real-time.</p>
                </div>
                <button class="bg-slate-900 text-white px-8 py-4 rounded-2xl font-black hover:bg-slate-800 transition-all shadow-xl shadow-slate-200 flex items-center space-x-2">
                    <i data-lucide="save" class="w-[18px] h-[18px]"></i>
                    <span>Simpan Perubahan</span>
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <!-- Sidebar Tabs -->
                <div class="lg:col-span-3">
                    <div class="bg-white rounded-[2rem] p-3 shadow-sm border border-slate-100 sticky top-24">
                        <button class="w-full flex items-center gap-4 px-5 py-4 rounded-xl font-bold transition-all mb-1 bg-toba-green text-white shadow-lg shadow-emerald-100 scale-[1.02]">
                            <i data-lucide="users" class="w-5 h-5"></i>
                            <span>Tentang Kami</span>
                        </button>
                        <button class="w-full flex items-center gap-4 px-5 py-4 rounded-xl font-bold transition-all mb-1 text-slate-400 hover:text-slate-600 hover:bg-slate-50">
                            <i data-lucide="sparkles" class="w-5 h-5"></i>
                            <span>Layanan</span>
                        </button>
                        <button class="w-full flex items-center gap-4 px-5 py-4 rounded-xl font-bold transition-all mb-1 text-slate-400 hover:text-slate-600 hover:bg-slate-50">
                            <i data-lucide="video" class="w-5 h-5"></i>
                            <span>Video Highlight</span>
                        </button>
                        <button class="w-full flex items-center gap-4 px-5 py-4 rounded-xl font-bold transition-all mb-1 text-slate-400 hover:text-slate-600 hover:bg-slate-50">
                            <i data-lucide="map-pin" class="w-5 h-5"></i>
                            <span>Lokasi</span>
                        </button>
                    </div>
                </div>

                <!-- Editor Area -->
                <div class="lg:col-span-9 bg-white rounded-[2.5rem] p-8 md:p-12 shadow-sm border border-slate-100 min-h-[600px]">
                    <div class="space-y-8">
                        <div class="flex items-center gap-4 mb-10 pb-6 border-b border-slate-50">
                            <div class="w-14 h-14 bg-slate-900 text-white rounded-[1.25rem] flex items-center justify-center shadow-xl shadow-slate-200">
                                <i data-lucide="users" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <h3 class="text-2xl font-black text-slate-900 tracking-tight leading-none mb-2">Tentang Kami</h3>
                                <p class="text-slate-400 font-medium text-sm">Ubah teks narasi utama di section awal.</p>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="space-y-2">
                                <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Judul Utama</label>
                                <input type="text" class="w-full px-5 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-toba-green font-bold text-slate-900 placeholder:font-medium transition-all" value="Apa itu Outbound?">
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Deskripsi</label>
                                <textarea class="w-full p-5 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-toba-green font-medium text-slate-700 min-h-[120px]">Bentuk pembelajaran ilmu terapan yang disimulasikan di alam terbuka dengan memadukan unsur intelegensia, fisik, dan mental dalam bentuk permainan interaktif.</textarea>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6 bg-slate-50 rounded-3xl">
                                <div class="space-y-2">
                                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Label Statistik</label>
                                    <input type="text" class="w-full px-5 py-4 bg-white border border-slate-100 rounded-2xl font-bold" value="Tahun Pengalaman">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">Value Statistik</label>
                                    <input type="text" class="w-full px-5 py-4 bg-white border border-slate-100 rounded-2xl font-bold" value="12+">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
