<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Pesanan | Wonderful Toba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { 'toba-green': '#15803d', 'toba-accent': '#22c55e' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 flex">
    <main class="flex-1 p-8 lg:p-12 overflow-y-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Daftar Pesanan</h1>
                <p class="text-slate-400 font-medium mt-1">Pantau dan kelola reservasi masuk.</p>
            </div>
            <div class="flex gap-2 bg-white p-1 rounded-2xl border border-slate-100">
                <button class="px-6 py-2 bg-toba-green text-white rounded-xl text-xs font-black uppercase tracking-widest">Semua</button>
                <button class="px-6 py-2 text-slate-400 rounded-xl text-xs font-black uppercase tracking-widest hover:text-slate-700">Pending</button>
                <button class="px-6 py-2 text-slate-400 rounded-xl text-xs font-black uppercase tracking-widest hover:text-slate-700">Confirmed</button>
            </div>
        </header>

        <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50/50">
                    <tr>
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Customer</th>
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Paket/Layanan</th>
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Total Tagihan</th>
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Status</th>
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr class="hover:bg-slate-50/30 transition-colors">
                        <td class="px-8 py-6">
                            <p class="font-bold text-slate-900 leading-none mb-1">Ariel Noah</p>
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">0812-xxxx-xxxx</p>
                        </td>
                        <td class="px-8 py-6">
                            <p class="font-bold text-slate-700 text-sm">Gatering Corporate - 100 Pax</p>
                            <p class="text-[10px] text-slate-400">12 Mei - 14 Mei 2026</p>
                        </td>
                        <td class="px-8 py-6">
                            <p class="font-black text-slate-900 italic">Rp 45.000.000</p>
                        </td>
                        <td class="px-8 py-6">
                            <span class="px-3 py-1 bg-amber-50 text-amber-600 text-[9px] font-black uppercase tracking-widest rounded-lg border border-amber-100">Pending</span>
                        </td>
                        <td class="px-8 py-6">
                            <button class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-toba-green transition-all">Kelola</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
