<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Paket | Wonderful Toba</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="../js/admin-sidebar.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { 'toba-green': '#15803d', 'toba-accent': '#22c55e' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-900 flex">
    <main class="flex-1 p-8 lg:p-12 overflow-y-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Daftar Paket</h1>
                <p class="text-slate-400 font-medium mt-1">Kelola paket wisata dan outbound Anda.</p>
            </div>
            <button class="bg-toba-green text-white px-8 py-4 rounded-2xl font-black text-sm shadow-lg shadow-toba-green/20 flex items-center gap-3">
                <i data-lucide="plus" class="w-5 h-5"></i> Tambah Paket Baru
            </button>
        </header>

        <div class="bg-white rounded-[2.5rem] border border-slate-100 shadow-sm overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50/50">
                    <tr>
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Informasi Paket</th>
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Kategori</th>
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Harga</th>
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Status</th>
                        <th class="px-8 py-5 text-[10px] font-black uppercase tracking-widest text-slate-400">Aksi</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                    <tr class="hover:bg-slate-50/30 transition-colors">
                        <td class="px-8 py-6 flex items-center gap-4">
                            <img src="../assets/images/2023/10/00-Marianna-Resort-Samosir-wonderfultoba_outbound-outbound_medan.jpg" class="w-16 h-12 object-cover rounded-xl">
                            <div>
                                <p class="font-black text-slate-900">Explore Toba Premium</p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">3 Hari 2 Malam</p>
                            </div>
                        </td>
                        <td class="px-8 py-6">
                            <span class="px-3 py-1 bg-blue-50 text-blue-600 text-[9px] font-black uppercase tracking-widest rounded-lg border border-blue-100">Tour</span>
                        </td>
                        <td class="px-8 py-6 font-bold text-slate-700">Rp 3.500k</td>
                        <td class="px-8 py-6">
                            <span class="px-3 py-1 bg-emerald-50 text-emerald-600 text-[9px] font-black uppercase tracking-widest rounded-lg border border-emerald-100">Aktif</span>
                        </td>
                        <td class="px-8 py-6">
                            <div class="flex gap-2">
                                <button class="p-2 text-slate-400 hover:text-toba-green"><i data-lucide="edit" class="w-4 h-4"></i></button>
                                <button class="p-2 text-slate-400 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </td>
                    </tr>
                    <!-- Outbound Example -->
                    <tr class="hover:bg-slate-50/30 transition-colors">
                        <td class="px-8 py-6 flex items-center gap-4">
                            <img src="../assets/images/2023/10/A11-Team-Building.jpg" class="w-16 h-12 object-cover rounded-xl">
                            <div>
                                <p class="font-black text-slate-900">Corporate Team Building</p>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Full Day Event</p>
                            </div>
                        </td>
                        <td class="px-8 py-6">
                            <span class="px-3 py-1 bg-indigo-50 text-indigo-600 text-[9px] font-black uppercase tracking-widest rounded-lg border border-indigo-100">Outbound</span>
                        </td>
                        <td class="px-8 py-6 font-bold text-slate-700">Rp 12.000k</td>
                        <td class="px-8 py-6">
                            <span class="px-3 py-1 bg-emerald-50 text-emerald-600 text-[9px] font-black uppercase tracking-widest rounded-lg border border-emerald-100">Aktif</span>
                        </td>
                        <td class="px-8 py-6">
                            <div class="flex gap-2">
                                <button class="p-2 text-slate-400 hover:text-toba-green"><i data-lucide="edit" class="w-4 h-4"></i></button>
                                <button class="p-2 text-slate-400 hover:text-rose-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
    <script>lucide.createIcons();</script>
</body>
</html>
